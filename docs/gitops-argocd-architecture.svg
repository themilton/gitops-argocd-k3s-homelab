<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" fill="none">
  <defs>
    <marker id="a1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#58a6ff"/>
    </marker>
    <marker id="a2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#238636"/>
    </marker>
  </defs>
  <rect width="900" height="450" rx="12" fill="#0d1117"/>
  <text x="450" y="28" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold" fill="#c9d1d9">GitOps Pipeline — ArgoCD + k3s Homelab</text>

  <!-- Developer -->
  <rect x="30" y="60" width="150" height="80" rx="8" fill="#161b22" stroke="#c9d1d9" stroke-width="1.5"/>
  <text x="105" y="85" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#c9d1d9">Developer</text>
  <text x="105" y="105" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">git push to main</text>
  <text x="105" y="120" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">or open PR</text>

  <line x1="180" y1="100" x2="230" y2="100" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#a1)"/>

  <!-- GitHub -->
  <rect x="230" y="60" width="160" height="80" rx="8" fill="#161b22" stroke="#c9d1d9" stroke-width="1.5"/>
  <text x="310" y="85" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#c9d1d9">GitHub Repo</text>
  <text x="310" y="105" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">k8s manifests</text>
  <text x="310" y="120" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">Helm values</text>

  <!-- ArgoCD watches GitHub -->
  <line x1="390" y1="100" x2="420" y2="100" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="405" y="90" font-family="monospace" font-size="7" fill="#58a6ff">poll 3m</text>

  <!-- ArgoCD -->
  <rect x="420" y="45" width="220" height="110" rx="8" fill="#1a2744" stroke="#f0883e" stroke-width="2"/>
  <text x="530" y="72" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#f0883e">ArgoCD</text>
  <text x="530" y="92" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">Detects drift between</text>
  <text x="530" y="107" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">Git desired state &amp;</text>
  <text x="530" y="122" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">cluster live state</text>
  <text x="530" y="145" text-anchor="middle" font-family="monospace" font-size="9" fill="#f0883e">Auto-sync: ON</text>

  <line x1="530" y1="155" x2="530" y2="185" stroke="#238636" stroke-width="1.5" marker-end="url(#a2)"/>
  <text x="545" y="175" font-family="monospace" font-size="8" fill="#238636">kubectl apply</text>

  <!-- k3s Cluster -->
  <rect x="330" y="185" width="400" height="240" rx="8" fill="#0d200d20" stroke="#238636" stroke-width="2"/>
  <text x="530" y="210" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#238636">k3s Cluster (3 nodes on KVM)</text>

  <!-- Namespaces -->
  <rect x="350" y="225" width="170" height="80" rx="6" fill="#161b22" stroke="#58a6ff" stroke-width="1"/>
  <text x="435" y="245" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#58a6ff">ns: production</text>
  <text x="360" y="263" font-family="monospace" font-size="8" fill="#8b949e">kumari-api (3 replicas)</text>
  <text x="360" y="276" font-family="monospace" font-size="8" fill="#8b949e">kumari-web (2 replicas)</text>
  <text x="360" y="289" font-family="monospace" font-size="8" fill="#8b949e">postgres (StatefulSet)</text>
  <text x="360" y="302" font-family="monospace" font-size="8" fill="#8b949e">redis (StatefulSet)</text>

  <rect x="540" y="225" width="170" height="80" rx="6" fill="#161b22" stroke="#b388ff" stroke-width="1"/>
  <text x="625" y="245" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#b388ff">ns: monitoring</text>
  <text x="550" y="263" font-family="monospace" font-size="8" fill="#8b949e">prometheus</text>
  <text x="550" y="276" font-family="monospace" font-size="8" fill="#8b949e">grafana</text>
  <text x="550" y="289" font-family="monospace" font-size="8" fill="#8b949e">loki + promtail</text>
  <text x="550" y="302" font-family="monospace" font-size="8" fill="#8b949e">jaeger (tracing)</text>

  <!-- Ingress -->
  <rect x="350" y="320" width="360" height="40" rx="6" fill="#161b22" stroke="#f0883e" stroke-width="1"/>
  <text x="530" y="345" text-anchor="middle" font-family="monospace" font-size="10" fill="#f0883e">Traefik Ingress Controller + cert-manager (Let's Encrypt)</text>

  <!-- Persistent storage -->
  <rect x="350" y="375" width="360" height="35" rx="6" fill="#161b22" stroke="#7ee787" stroke-width="1"/>
  <text x="530" y="397" text-anchor="middle" font-family="monospace" font-size="10" fill="#7ee787">Longhorn CSI → NFS on ZFS NAS (10.10.10.20:/tank/k8s-volumes)</text>

  <!-- Side: CI pipeline -->
  <rect x="680" y="60" width="195" height="110" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="777" y="85" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#58a6ff">GitHub Actions CI</text>
  <text x="695" y="105" font-family="monospace" font-size="8" fill="#8b949e">1. Lint + test</text>
  <text x="695" y="118" font-family="monospace" font-size="8" fill="#8b949e">2. Build Docker image</text>
  <text x="695" y="131" font-family="monospace" font-size="8" fill="#8b949e">3. Push to registry</text>
  <text x="695" y="144" font-family="monospace" font-size="8" fill="#8b949e">4. Update image tag in Git</text>
  <text x="695" y="157" font-family="monospace" font-size="8" fill="#58a6ff">   (triggers ArgoCD sync)</text>

  <line x1="680" y1="100" x2="640" y2="100" stroke="#58a6ff" stroke-width="1" marker-end="url(#a1)"/>

  <!-- Bottom: The loop -->
  <text x="450" y="440" text-anchor="middle" font-family="monospace" font-size="10" fill="#6c7086">Git is the single source of truth. No kubectl apply by hand. Ever.</text>
</svg>