apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kumari-staging-ingress
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: letsencrypt-staging
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - staging.kumari.homelab.local
      secretName: kumari-staging-tls
  rules:
    - host: staging.kumari.homelab.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: kumari-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kumari-frontend
                port:
                  number: 3000
